<html lang="pt-BR">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #30363d;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #e6edf3;
        }

        .score {
            font-size: 18px;
            font-weight: 600;
            color: #3fb950;
            background-color: #161b22;
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid #30363d;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
            border-bottom: 1px solid #30363d;
        }

        .tabs::-webkit-scrollbar {
            height: 6px;
        }

        .tabs::-webkit-scrollbar-track {
            background: transparent;
        }

        .tabs::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 3px;
        }

        .tab-btn {
            padding: 10px 16px;
            background-color: #161b22;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            background-color: #21262d;
            border-color: #30363d;
        }

        .tab-btn.active {
            background-color: #388bfd;
            border-color: #388bfd;
            color: #0d1117;
        }

        .buttons-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 16px;
            border: 1px solid #30363d;
            background-color: #161b22;
            color: #e6edf3;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #21262d;
            border-color: #30363d;
        }

        .btn.danger {
            border-color: #f85149;
            color: #f85149;
        }

        .btn.danger:hover {
            background-color: rgba(248, 81, 73, 0.1);
        }

        .btn.info {
            border-color: #388bfd;
            color: #388bfd;
        }

        .btn.info:hover {
            background-color: rgba(56, 139, 253, 0.1);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .question-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-number {
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 16px;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .option {
            padding: 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #e6edf3;
            transition: all 0.2s ease;
            user-select: none;
        }

        .option:hover:not(.disabled):not(.answered) {
            background-color: #21262d;
            border-color: #30363d;
        }

        .option.selected {
            background-color: #388bfd;
            border-color: #388bfd;
            color: #0d1117;
            font-weight: 600;
        }

        .option.correct {
            background-color: #3fb950;
            border-color: #3fb950;
            color: #0d1117;
            font-weight: 600;
        }

        .option.incorrect {
            background-color: #f85149;
            border-color: #f85149;
            color: #0d1117;
            font-weight: 600;
        }

        .option.disabled {
            cursor: not-allowed;
        }

        .option.answered {
            cursor: default;
        }

        .explanation {
            background-color: #0d1117;
            border-left: 3px solid #388bfd;
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            display: none;
            font-size: 13px;
            line-height: 1.6;
        }

        .explanation.show {
            display: block;
        }

        .explanation-title {
            font-weight: 600;
            color: #388bfd;
            margin-bottom: 6px;
        }

        .explanation-text {
            color: #8b949e;
        }

        .answer-status {
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            display: none;
        }

        .answer-status.correct-msg {
            display: block;
            background-color: rgba(63, 185, 80, 0.1);
            border: 1px solid #3fb950;
            color: #3fb950;
        }

        .answer-status.incorrect-msg {
            display: block;
            background-color: rgba(248, 81, 73, 0.1);
            border: 1px solid #f85149;
            color: #f85149;
        }

        .gabarito-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 12px;
            background-color: #1f6feb;
            border: 1px solid #388bfd;
            color: #e6edf3;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .gabarito-btn:hover {
            background-color: #388bfd;
        }

        .gabarito-btn.active {
            background-color: #388bfd;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8b949e;
        }

        .empty-state p {
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>

            "02-02": "02-02 — Introdução à Infectologia: Raciocínio Clínico, Prevenção e Biossegurança",
            "02-06": "02-06 — Hanseníase: Epidemiologia e Tratamento",
            "02-09": "02-09 — Epidemiologia e Evolução do Pensamento Científico",
            "02-13": "02-13 — ISTs: Gestão e Prevenção",
            "02-20": "02-20 — AIDS: Evolução, Tratamento e Erradicação",
            "02-23": "02-23 — Regulação Térmica, Febre e FOI",
            "02-27": "02-27 — Doença de Chagas",
            "03-06": "03-06 — Leptospirose"
        };

        const lectureOrder = ["02-02", "02-06", "02-09", "02-13", "02-20", "02-23", "02-27", "03-06"];

        let currentLecture = "02-02";
        let answers = {};
        let showGabaritoMode = false;

        // Initialize
        function init() {
            renderTabs();
            renderContent();
            updateScore();
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabsContainer');
            tabsContainer.innerHTML = '';

            lectureOrder.forEach(lecture => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${lecture === currentLecture ? 'active' : ''}`;
                btn.textContent = lectureMap[lecture];
                btn.onclick = () => selectLecture(lecture);
                tabsContainer.appendChild(btn);
            });
        }

        function selectLecture(lecture) {
            currentLecture = lecture;
            showGabaritoMode = false;
            renderTabs();
            renderContent();
            updateScore();
            document.getElementById('gabaritoBtn').classList.remove('active');
            document.getElementById('gabaritoBtn').textContent = 'Ver Gabarito';
        }

        function renderContent() {
            const contentContainer = document.getElementById('contentContainer');
            const questions = questionData[currentLecture] || [];

            contentContainer.innerHTML = '';

            if (questions.length === 0) {
                contentContainer.innerHTML = '<div class="empty-state"><p>Nenhuma questão disponível para esta aula.</p></div>';
                return;
            }

            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                const questionNum = document.createElement('div');
                questionNum.className = 'question-number';
                questionNum.textContent = `Questão ${idx + 1} de ${questions.length}`;

                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = q.pergunta;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                const answerKey = `${currentLecture}-${idx}`;
                const selectedOption = answers[answerKey];

                q.opcoes.forEach((option, optIdx) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';

                    const isCorrect = optIdx === q.correta;
                    const isSelected = selectedOption === optIdx;

                    if (selectedOption !== undefined) {
                        optionDiv.classList.add('disabled', 'answered');
                        if (isSelected && isCorrect) {
                            optionDiv.classList.add('correct');
                        } else if (isSelected && !isCorrect) {
                            optionDiv.classList.add('incorrect');
                        } else if (isCorrect && showGabaritoMode) {
                            optionDiv.classList.add('correct');
                        }
                    } else if (showGabaritoMode && isCorrect) {
                        optionDiv.classList.add('correct');
                    } else if (isSelected) {
                        optionDiv.classList.add('selected');
                    }

                    optionDiv.textContent = `${String.fromCharCode(65 + optIdx)}) ${option}`;

                    if (selectedOption === undefined && !showGabaritoMode) {
                        optionDiv.onclick = () => selectOption(answerKey, optIdx, isCorrect, q.correta);
                    }

                    optionsDiv.appendChild(optionDiv);
                });

                const explanationDiv = document.createElement('div');
                explanationDiv.className = 'explanation';

                if (selectedOption !== undefined || showGabaritoMode) {
                    explanationDiv.classList.add('show');
                    explanationDiv.innerHTML = `
                        <div class="explanation-title">Resposta Correta: ${String.fromCharCode(65 + q.correta)}</div>
                        <div class="explanation-text">${q.explicacao}</div>
                    `;
                }

                const statusDiv = document.createElement('div');
                statusDiv.className = 'answer-status';

                if (selectedOption !== undefined) {
                    const isCorrect = selectedOption === q.correta;
                    if (isCorrect) {
                        statusDiv.classList.add('correct-msg');
                        statusDiv.textContent = '✓ Resposta Correta!';
                    } else {
                        statusDiv.classList.add('incorrect-msg');
                        statusDiv.textContent = '✗ Resposta Incorreta';
                    }
                }

                card.appendChild(questionNum);
                card.appendChild(questionText);
                card.appendChild(optionsDiv);
                card.appendChild(explanationDiv);
                card.appendChild(statusDiv);

                contentContainer.appendChild(card);
            });
        }

        function selectOption(answerKey, optIdx, isCorrect, correctIdx) {
            answers[answerKey] = optIdx;
            updateScore();
            renderContent();
        }

        function updateScore() {
            const questions = questionData[currentLecture] || [];
            let correct = 0;

            questions.forEach((q, idx) => {
                const answerKey = `${currentLecture}-${idx}`;
                if (answers[answerKey] === q.correta) {
                    correct++;
                }
            });

            document.getElementById('scoreText').textContent = `${correct} / ${questions.length}`;
        }

        function resetLecture() {
            lectureOrder.forEach(lecture => {
                for (let i = 0; i < (questionData[lecture] || []).length; i++) {
                    delete answers[`${lecture}-${i}`];
                }
            });
            renderContent();
            updateScore();
            showGabaritoMode = false;
            document.getElementById('gabaritoBtn').classList.remove('active');
            document.getElementById('gabaritoBtn').textContent = 'Ver Gabarito';
        }

        function toggleGabarito() {
            showGabaritoMode = !showGabaritoMode;
            const btn = document.getElementById('gabaritoBtn');
            if (showGabaritoMode) {
                btn.classList.add('active');
                btn.textContent = 'Ocultar Gabarito';
            } else {
                btn.classList.remove('active');
                btn.textContent = 'Ver Gabarito';
            }
            renderContent();
        }

        document.getElementById('resetBtn').onclick = resetLecture;
        document.getElementById('gabaritoBtn').onclick = toggleGabarito;

        init();
    </script>
</body>
</html>
