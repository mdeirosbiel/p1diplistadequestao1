        }

            border-color: #3fb950;

            justify-content: center;

            height: 24px;
            background: #30363d;
            border-radius: 3px;
            font-weight: 600;
            font-size: 0.85em;

            color: #0d1117;
        }

            padding: 12px;
            background: rgba(88, 166, 255, 0.1);
            border-left: 3px solid #388bfd;
            border-radius: 4px;

            font-weight: 600;

        let currentTab = "02-02";
        let answered = {};

        function initTabs() {
            const tabsContainer = document.getElementById('tabs');
            Object.keys(questionData).forEach(aula => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (aula === '02-02' ? ' active' : '');
                const aulaNames = {'02-02':'02-02 — Raciocínio Clínico e Biossegurança','02-06':'02-06 — Hanseníase','02-09':'02-09 — Epidemiologia e Pensamento Científico','02-13':'02-13 — ISTs'}; btn.textContent = aulaNames[aula] || `Aula ${aula}`;
                btn.onclick = () => switchTab(aula);
                tabsContainer.appendChild(btn);
            });
        }

        function switchTab(aula) {
            currentTab = aula;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderQuestions();
            updateStats();
        }

        function renderQuestions() {
            const content = document.getElementById('content');
            const questions = questionData[currentTab] || [];

            if (questions.length === 0) {
                content.innerHTML = '<div class="empty-state">Questões ainda não disponíveis para esta aula.</div>';
                return;
            }

            content.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'questions-grid';

            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'question-card';

                const qNum = document.createElement('div');
                qNum.className = 'question-number';
                qNum.textContent = `Questão ${idx + 1}`;
                card.appendChild(qNum);

                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.textContent = q.pergunta;
                card.appendChild(qText);

                const options = document.createElement('div');
                options.className = 'options';

                const letters = ['A', 'B', 'C', 'D'];
                q.opcoes.forEach((opt, optIdx) => {
                    const option = document.createElement('button');
                    option.className = 'option';
                    option.innerHTML = `<span class="option-letter">${letters[optIdx]}</span><span>${opt}</span>`;

                    const key = `${currentTab}-${idx}`;
                    if (answered[key] !== undefined) {
                        option.classList.add('disabled');
                        if (answered[key] === optIdx) {
                            option.classList.add('selected');
                            if (optIdx !== q.correta) {
                                option.classList.add('incorrect');
                            }
                        } else if (optIdx === q.correta && answered[key] !== q.correta) {
                            option.classList.add('selected');
                        }
                    }

                    option.onclick = () => {
                        if (!answered[key]) {
                            answered[key] = optIdx;
                            renderQuestions();
                            updateStats();
                        }
                    };

                    options.appendChild(option);
                });

                card.appendChild(options);

                if (answered[`${currentTab}-${idx}`] !== undefined) {
                    const exp = document.createElement('div');
                    exp.className = 'explanation show';
                    exp.innerHTML = `
                        <div class="explanation-title">Explicação</div>
                        <div class="explanation-text">${q.explicacao}</div>
                    `;
                    card.appendChild(exp);
                }

                grid.appendChild(card);
            });

            content.appendChild(grid);
        }

        function updateStats() {
            let correct = 0;
            let total = 0;

            Object.keys(questionData).forEach(aula => {
                const questions = questionData[aula];
                questions.forEach((q, idx) => {
                    total++;
                    const key = `${aula}-${idx}`;
                    if (answered[key] === q.correta) {
                        correct++;
                    }
                });
            });

            document.getElementById('correct-count').textContent = correct;
            document.getElementById('total-count').textContent = total;
        }

        function resetCurrentTab() {
            const questions = questionData[currentTab];
            questions.forEach((q, idx) => {
                delete answered[`${currentTab}-${idx}`];
            });
            renderQuestions();
            updateStats();
        }

        function resetAll() {
            answered = {};
            renderQuestions();
            updateStats();
        }

        initTabs();
        renderQuestions();
        updateStats();
    </script>
